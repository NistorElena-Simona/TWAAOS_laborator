<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar de sarcini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark navbar-gradient shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold fs-5">Gestionar de sarcini</span>
        <div id="info-utilizator" class="d-none align-items-center gap-3">
            <span id="email-utilizator" class="text-white small"></span>
            <span id="contor-sarcini" class="badge bg-white text-primary small"></span>
            <button class="btn btn-outline-light btn-sm" onclick="deconecteaza()">Deconectare</button>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center mb-4">
        <div class="col-xl-10">
            <div class="p-4 rounded-4 shadow-sm bg-white border">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="h3 fw-bold mb-2">Gestionar de sarcini</h1>
                        <p class="text-muted mb-0">Adaugă, urmărește și finalizează rapid sarcinile importante.</p>
                    </div>
                    <div class="col-md-4 text-md-end mt-3 mt-md-0">
                        <span class="badge bg-primary-subtle text-primary py-2 px-3 rounded-pill">Flux elegant și rapid</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sectiune-auth">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm rounded-4 border-0 overflow-hidden">
                    <div class="card-header bg-white border-bottom-0 py-3">
                        <div class="d-flex gap-2">
                            <button id="tab-inregistrare" class="btn btn-lg rounded-pill flex-fill btn-primary active" onclick="selecteazaTab('inregistrare')">Înregistrare</button>
                            <button id="tab-autentificare" class="btn btn-lg rounded-pill flex-fill btn-outline-primary" onclick="selecteazaTab('autentificare')">Autentificare</button>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div id="form-inregistrare">
                            <h5 class="card-title mb-4">Creează un cont nou</h5>
                            <div id="eroare-inregistrare" class="alert alert-danger d-none"></div>
                            <div id="succes-inregistrare" class="alert alert-success d-none"></div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="reg-email" class="form-control form-control-lg" placeholder="exemplu@domain.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Parolă</label>
                                <input type="password" id="reg-parola" class="form-control form-control-lg" placeholder="Cel puțin 8 caractere">
                            </div>
                            <button class="btn btn-primary btn-lg w-100" onclick="inregistreaza()">Înregistrează-te</button>
                        </div>

                        <div id="form-autentificare" class="d-none">
                            <h5 class="card-title mb-4">Conectează-te</h5>
                            <div id="eroare-autentificare" class="alert alert-danger d-none"></div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="auth-email" class="form-control form-control-lg" placeholder="exemplu@domain.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Parolă</label>
                                <input type="password" id="auth-parola" class="form-control form-control-lg" placeholder="Parola ta">
                            </div>
                            <button class="btn btn-primary btn-lg w-100" onclick="autentifica()">Conectează-te</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sectiune-sarcini" class="d-none">
        <div class="row g-4 mb-4">
            <div class="col-lg-5">
                <div class="card shadow-sm rounded-4 border-0">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3">Adaugă o sarcină nouă</h5>
                        <div class="mb-3">
                            <input type="text" id="sarcina-titlu" class="form-control form-control-lg" placeholder="Titlu task">
                        </div>
                        <div class="mb-3">
                            <textarea id="sarcina-descriere" class="form-control form-control-lg" placeholder="Descriere opțională" rows="3"></textarea>
                        </div>
                        <button class="btn btn-success btn-lg w-100" onclick="adaugaSarcina()">Adaugă sarcina</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card shadow-sm rounded-4 border-0">
                    <div class="card-body p-4">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-3">
                            <h5 class="card-title mb-0">Sarcinile mele</h5>
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" id="doar-nefinalizate" onchange="incarcaSarcini()">
                                <label class="form-check-label" for="doar-nefinalizate">Doar nefinalizate</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <input type="text" id="cautare" class="form-control form-control-lg" placeholder="Caută după titlu..." oninput="filtreazaLocal()">
                        </div>
                        <div id="lista-sarcini" class="row g-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        min-height: 100vh;
        background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 55%, #ffffff 100%);
    }

    .navbar-gradient {
        background: linear-gradient(90deg, #4f46e5, #0ea5e9);
    }

    .card {
        border-radius: 1.5rem;
    }

    .card-body {
        padding: 1.75rem;
    }

    #info-utilizator span {
        white-space: nowrap;
    }

    .task-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .task-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .text-muted {
        color: #65748b !important;
    }

    .btn-outline-primary.active,
    .btn-outline-primary:focus,
    .btn-outline-primary:hover {
        color: #fff;
        background-color: #0ea5e9;
        border-color: #0ea5e9;
    }

    #form-autentificare,
    #form-inregistrare {
        min-height: 300px;
    }

    #lista-sarcini .card {
        min-height: 150px;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    //const API = "http://localhost:8000";
    // Dupa (URL relativ - functioneaza pe orice domeniu):
    const API = "";
    let toateSarcinile = [];

    // -------- Gestionarea token-ului --------

    function salveazaToken(token) {
        localStorage.setItem("token", token);
    }

    function obtineToken() {
        return localStorage.getItem("token");
    }

    function deconecteaza() {
        localStorage.removeItem("token");
        actualizeazaUI();
    }

    // -------- Actualizarea interfetei --------

    function actualizeazaUI() {
        const token = obtineToken();
        if (token) {
            document.getElementById("sectiune-auth").classList.add("d-none");
            document.getElementById("sectiune-sarcini").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.add("d-flex");
            try {
                const payload = JSON.parse(atob(token.split(".")[1]));
                document.getElementById("email-utilizator").textContent = payload.sub;
            } catch (e) { /* token malformat */ }
            incarcaSarcini();
        } else {
            document.getElementById("sectiune-auth").classList.remove("d-none");
            document.getElementById("sectiune-sarcini").classList.add("d-none");
            document.getElementById("info-utilizator").classList.add("d-none");
            document.getElementById("info-utilizator").classList.remove("d-flex");
        }
    }

    function comutaFormular() {
        const areInregistrare = !document.getElementById("form-inregistrare").classList.contains("d-none");
        selecteazaTab(areInregistrare ? 'autentificare' : 'inregistrare');
    }

    function selecteazaTab(tab) {
        const inreg = document.getElementById("form-inregistrare");
        const auth = document.getElementById("form-autentificare");
        const tabInreg = document.getElementById("tab-inregistrare");
        const tabAuth = document.getElementById("tab-autentificare");

        if (tab === 'autentificare') {
            inreg.classList.add("d-none");
            auth.classList.remove("d-none");
            tabInreg.classList.remove("active");
            tabInreg.classList.add("btn-outline-primary");
            tabAuth.classList.add("active");
            tabAuth.classList.remove("btn-outline-primary");
        } else {
            inreg.classList.remove("d-none");
            auth.classList.add("d-none");
            tabAuth.classList.remove("active");
            tabAuth.classList.add("btn-outline-primary");
            tabInreg.classList.add("active");
            tabInreg.classList.remove("btn-outline-primary");
        }

        document.getElementById("reg-email").value = "";
        document.getElementById("reg-parola").value = "";
        document.getElementById("auth-email").value = "";
        document.getElementById("auth-parola").value = "";
    }

    // -------- Autentificare --------

    async function inregistreaza() {
        ascundeEroare("eroare-inregistrare");
        ascundeEroare("succes-inregistrare");
        const email = document.getElementById("reg-email").value;
        const parola = document.getElementById("reg-parola").value;
        console.log('Sending registration data:', { email, parola });
        try {
            const raspuns = await fetch(`${API}/inregistrare`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, parola })
            });
            if (!raspuns.ok) {
                const eroare = await raspuns.json();
                let mesaj = "Eroare la înregistrare.";
                if (eroare.detail) {
                    if (Array.isArray(eroare.detail)) {
                        mesaj = eroare.detail.map(d => d.msg || JSON.stringify(d)).join(', ');
                    } else {
                        mesaj = eroare.detail;
                    }
                }
                afiseazaEroare("eroare-inregistrare", mesaj);
                return;
            }
            afiseazaSucces("succes-inregistrare", "Cont creat! Te poți autentifica.");
            setTimeout(comutaFormular, 1500);
        } catch {
            afiseazaEroare("eroare-inregistrare", "Nu se poate contacta serverul.");
        }
    }

    async function autentifica() {
        ascundeEroare("eroare-autentificare");
        const email = document.getElementById("auth-email").value;
        const parola = document.getElementById("auth-parola").value;
        const dateFormular = new URLSearchParams();
        dateFormular.append("username", email);
        dateFormular.append("password", parola);
        try {
            const raspuns = await fetch(`${API}/autentificare`, {
                method: "POST",
                body: dateFormular
            });
            if (!raspuns.ok) {
                afiseazaEroare("eroare-autentificare", "Email sau parolă incorecte.");
                return;
            }
            const date = await raspuns.json();
            salveazaToken(date.access_token);
            actualizeazaUI();
        } catch {
            afiseazaEroare("eroare-autentificare", "Nu se poate contacta serverul.");
        }
    }

    // -------- Sarcini --------

    // async function incarcaSarcini() {
    //     const token = obtineToken();
    //     try {
    //         const raspuns = await fetch(`${API}/sarcini`, {
    //             headers: { "Authorization": `Bearer ${token}` }
    //         });
    //         if (raspuns.status === 401) { deconecteaza(); return; }
    //         if (!raspuns.ok) return;
    //         const sarcini = await raspuns.json();
    //         randeazaSarcini(sarcini);
    //     } catch {
    //         document.getElementById("lista-sarcini").innerHTML =
    //             `<div class="alert alert-warning">Nu se poate contacta serverul.</div>`;
    //     }
    // }


    async function incarcaSarcini() {
    const token = obtineToken();
    const doarNefinalizate = document.getElementById("doar-nefinalizate")?.checked;

    const url = doarNefinalizate
        ? `${API}/sarcini?doar_nefinalizate=true`
        : `${API}/sarcini`;

    try {
        const raspuns = await fetch(url, {
            headers: { "Authorization": `Bearer ${token}` }
        });

        if (raspuns.status === 401) {
            deconecteaza();
            return;
        }

        if (!raspuns.ok) return;

        const sarcini = await raspuns.json();
        toateSarcinile = sarcini;
        randeazaSarcini(sarcini);

    } catch {
        document.getElementById("lista-sarcini").innerHTML =
            `<div class="alert alert-warning">Eroare server.</div>`;
    }
}

    function randeazaSarcini(sarcini) {
        const container = document.getElementById("lista-sarcini");

        const total = sarcini.length;
        const finalizate = sarcini.filter(s => s.finalizata).length;
        document.getElementById("contor-sarcini").textContent = `${total} sarcini / ${finalizate} finalizate`;

        if (sarcini.length === 0) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-info mb-0">Nicio sarcină adăugată încă.</div></div>`;
            return;
        }

        container.innerHTML = sarcini.map(s => `
            <div class="col-md-6">
                <div class="card task-card" data-id="${s.id}">
                    <div class="card-body d-flex flex-column gap-3">
                        <div>
                            <div class="d-flex align-items-start justify-content-between gap-3">
                                <div>
                                    <h6 class="mb-2 fw-semibold">${escapeHtml(s.titlu)}</h6>
                                    <span class="badge ${s.finalizata ? 'bg-success' : 'bg-secondary'} badge-status">${s.finalizata ? 'Finalizată' : 'În progres'}</span>
                                </div>
                                <div class="text-end text-muted small">ID ${s.id}</div>
                            </div>
                            <p class="text-muted mb-0">${escapeHtml(s.descriere || 'Fără descriere')}</p>
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-success" onclick="finalizeazaSarcina(${s.id})" ${s.finalizata ? 'disabled' : ''}>Finalizează</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="editeazaSarcina(${s.id}, '${escapeHtml(s.titlu)}', '${escapeHtml(s.descriere || '')}')">Editează</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="stergeSarcina(${s.id})">Șterge</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join("");
    }
    function filtreazaLocal() {
    const text = document.getElementById("cautare").value.toLowerCase();

   if (text === "") {
        randeazaSarcini(toateSarcinile);
        return;
    }

    const filtrate = toateSarcinile.filter(s =>
        s.titlu.toLowerCase().includes(text)
    );

    randeazaSarcini(filtrate);
}

    async function adaugaSarcina() {
        const titlu = document.getElementById("sarcina-titlu").value.trim();
        if (!titlu) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    titlu,
                    descriere: document.getElementById("sarcina-descriere").value.trim()
                })
            });
            if (raspuns.ok) {
                document.getElementById("sarcina-titlu").value = "";
                document.getElementById("sarcina-descriere").value = "";
                incarcaSarcini();
            }
        } catch {
            alert("Nu se poate contacta serverul. Verificați că uvicorn rulează.");
        }
    }

    async function finalizeazaSarcina(id) {
        if (!confirm("Ești sigur că vrei să ștergi această sarcină?")) return;

        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}/finalizeaza`, {
                method: "PATCH",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul. Verificați că uvicorn rulează.");
        }
    }

    async function stergeSarcina(id) {
        if (!confirm("Ești sigur că vrei să ștergi această sarcină?")) return;

        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul. Verificați că uvicorn rulează.");
        }
        
    }

    async function editeazaSarcina(id, titluCurent, descriereCurenta) {
    const container = document.getElementById("lista-sarcini");

    // găsim cardul și îl înlocuim (simplificat: re-randăm doar unul)
    const carduri = container.children;

    for (let card of carduri) {
        // if (card.innerHTML.includes(`(${id})`) || card.innerHTML.includes(`editeazaSarcina(${id}`)) {
        if (card.dataset.id == id) {
            card.innerHTML = `
                <div class="card-body">
                    <input type="text" id="edit-titlu-${id}" class="form-control mb-2"
                        value="${titluCurent}">
                    <textarea id="edit-desc-${id}" class="form-control mb-2">${descriereCurenta}</textarea>
                    <button class="btn btn-success btn-sm"
                        onclick="salveazaEditare(${id})">Salvează</button>
                    <button class="btn btn-secondary btn-sm"
                        onclick="incarcaSarcini()">Anulează</button>
                </div>
            `;
        }
    }
}


async function salveazaEditare(id) {
    const titlu = document.getElementById(`edit-titlu-${id}`).value;
    const descriere = document.getElementById(`edit-desc-${id}`).value;
    const token = obtineToken();

    try {
        const raspuns = await fetch(`${API}/sarcini/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ titlu, descriere })
        });

        if (raspuns.ok) {
            incarcaSarcini();
        }
    } catch {
        alert("Eroare la salvare.");
    }
}

    // -------- Utilitare --------

    function afiseazaEroare(elementId, mesaj) {
        const el = document.getElementById(elementId);
        el.textContent = mesaj;
        el.classList.remove("d-none");
    }

    function afiseazaSucces(elementId, mesaj) {
        const el = document.getElementById(elementId);
        el.textContent = mesaj;
        el.classList.remove("d-none");
    }

    function ascundeEroare(elementId) {
        document.getElementById(elementId).classList.add("d-none");
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = String(text);
        return div.innerHTML;
    }

    // -------- Initializare --------
    document.addEventListener("DOMContentLoaded", actualizeazaUI);
</script>
</body>
</html>
